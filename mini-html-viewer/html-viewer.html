<!doctype html><html><head></head><body><!DOCTYPE html>
<html>


<!-- made by me--> 




<body>
	<h2>Mini HTML Viewer</h2>


	<input type="file" id="file-input" accept=".html">
	<iframe id="viewer" style="width:100%; height:80vh;"></iframe>


	<script>
		document.getElementById('file-input').onchange = e => {
    let file = e.target.files[0];
    let reader = new FileReader();


    reader.onload = () => {
        document.getElementById('viewer').srcdoc = reader.result;
    };


    reader.readAsText(file);
};
	</script>


</body>


</html></body><html>
