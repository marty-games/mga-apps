<!DOCTYPE html>

<meta charset="UTF-8">

<title>HawkTV</title>

<style>
body{
    margin:0;
    background:#000;
    color:#ff2a2a;
    font-family:Arial, sans-serif;
}

.page{
    max-width:1000px;
    margin:0 auto;
    padding:10px 12px 25px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid #330000;
}

.title{
    font-size:20px;
    font-weight:bold;
}

#search{
    width:200px;
    padding:6px;
    background:#000;
    color:#ff2a2a;
    border:1px solid #aa0000;
}

#playerBox{
    width:100%;
    height:420px;
    margin-top:12px;
    border:2px solid #aa0000;
    border-radius:6px;
    overflow:hidden;
    background:black;
}

iframe{
    width:100%;
    height:100%;
    border:0;
}

/* CATEGORY BAR */
.categories{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
}

.cat{
    padding:6px 10px;
    border:1px solid #aa0000;
    cursor:pointer;
    font-size:12px;
    background:#111;
}

.cat:hover{
    background:#220000;
}

/* GRID */
.grid{
    margin-top:15px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:12px;
}

.card{
    background:#111;
    border:1px solid #220000;
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    border-color:#ff2a2a;
}

.thumb{
    width:100%;
    height:120px;
    object-fit:cover;
}

.info{
    padding:8px;
}

.titleText{
    font-size:13px;
    font-weight:bold;
}

.desc{
    font-size:11px;
    color:#cc6666;
}
</style>
</head>

/* ========================================================= */

function ytEmbed(id){
    return `https://www.youtube-nocookie.com/embed/${id}`;
}

function ytThumb(id){
    return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
}

// PLAYER
function play(video){
    playerBox.innerHTML = `
        <iframe
            src="${ytEmbed(video.id)}"
            allowfullscreen
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        ></iframe>
    `;
}

// GRID
function render(list){
    grid.innerHTML = "";

    list.forEach(video => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img class="thumb" src="${ytThumb(video.id)}">
            <div class="info">
                <div class="titleText">${video.title}</div>
                <div class="desc">${video.desc}</div>
            </div>
        `;

        card.onclick = () => play(video);
        grid.appendChild(card);
    });
}

/* =========================================================
   ✅ FIXED CATEGORY FILTER (THIS WAS BROKEN)
   ========================================================= */

function applyFilters(){

    const q = search.value.toLowerCase();

    const filtered = videos.filter(v => {

        const matchText =
            v.title.toLowerCase().includes(q) ||
            v.desc.toLowerCase().includes(q);

        const matchCat =
            currentCategory === "all" ||
            (Array.isArray(v.cat) && v.cat.includes(currentCategory));

        return matchText && matchCat;
    });

    render(filtered);
}

// SEARCH
search.addEventListener("input", applyFilters);

// CATEGORY CLICK
document.querySelectorAll(".cat").forEach(btn => {
    btn.addEventListener("click", () => {
        currentCategory = btn.dataset.cat;
        applyFilters();
    });
});
