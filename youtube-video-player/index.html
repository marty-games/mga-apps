<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            text-align: center;
        }
        p {
            color: #2c3e50;
            padding-bottom: 10px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .video-container {
            margin-top: 25px;
            position: relative;
            padding-bottom: 56.25%; /* Perfect 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: none;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>YouTube Video Player (No Cookies)</h2>
    
    <div class="form-group">
        <label for="ytUrl">Paste YouTube URL:</label>
        <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=... or https://youtu.be/...">
        <div id="errorMsg" class="error">Whoops! That doesn't look like a valid YouTube link.</div>
    </div>
    
    <button onclick="launchVideo()">Load Video</button>
    
    <div id="videoContainer" class="video-container"></div>
    <p>Made for <a href="https://marty-games.github.io">Marty Games</a>.</p>
</div>

<script>
function extractVideoId(url) {
    // Regex handles standard, shorts, mobile, embeds, and shared links
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
    const match = url.match(regExp);
    return (match && match[2].length === 11) ? match[2] : null;
}

function launchVideo() {
    const urlInput = document.getElementById('ytUrl').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const videoContainer = document.getElementById('videoContainer');
    
    // Clear things out for a fresh attempt
    errorMsg.style.display = 'none';
    videoContainer.style.display = 'none';
    videoContainer.innerHTML = '';
    
    if (!urlInput) return;
    
    const videoId = extractVideoId(urlInput);
    
    if (videoId) {
        // Construct the privacy-enhanced embed URL
        const noCookieUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
        
        // Dynamically build and insert the actual iframe element
        videoContainer.innerHTML = `
            <iframe 
                src="${noCookieUrl}" 
                title="YouTube privacy video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>`;
        
        // Reveal the player container
        videoContainer.style.display = 'block';
    } else {
        // Show error if the ID extraction fails
        errorMsg.style.display = 'block';
    }
}
</script>

</body>
</html>
