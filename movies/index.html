<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>Aetheris — Movies</title>

    <link rel="stylesheet" href="./css/themes.css?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=JetBrains+Mono:wght@300;400&display=swap" />
    <link rel="stylesheet" href="./css/master.css?v=2" />
    <link rel="stylesheet" href="./css/nav.css?v=2" />
<script defer src="./js/preload.js"></script>
    <script src="./js/theme.js?v=2"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--background);
            color: var(--text-color, #f5f5f5);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
        }

        .movies-header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: color-mix(in srgb, var(--navbar, #0b0b0b) 80%, transparent);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 12px 20px;
        }

        .movies-nav {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .movies-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent, #d946ef);
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .mode-btns { display: flex; gap: 8px; }

        .mode-btn {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            background: rgba(255,255,255,0.06);
            color: var(--text-color, #f5f5f5);
        }

        .mode-btn.active {
            background: var(--accent, #d946ef);
            color: #fff;
            border-color: var(--accent, #d946ef);
        }

        .search-wrap { position: relative; flex: 1; max-width: 340px; min-width: 140px; }

        .search-wrap input {
            width: 100%;
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.07);
            color: var(--text-color, #f5f5f5);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-wrap input:focus { border-color: var(--accent, #d946ef); }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.35); }

        main {
            max-width: 1400px;
            margin: 28px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.45);
            border-color: var(--accent, #d946ef);
        }

        .card img {
            width: 100%;
            height: 225px;
            object-fit: cover;
            display: block;
        }

        .card .info { padding: 9px 10px; }

        .card .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-color, #f5f5f5);
        }

        .card .card-meta {
            font-size: 0.75rem;
            color: var(--accent, #d946ef);
            margin-top: 3px;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .status-msg {
            margin: 40px 0;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.9rem;
        }

        .load-more {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 225px;
            background: color-mix(in srgb, var(--accent, #d946ef) 15%, transparent);
            color: var(--accent, #d946ef);
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 14px;
            border: 1px dashed color-mix(in srgb, var(--accent, #d946ef) 50%, transparent);
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            user-select: none;
        }

        .load-more:hover {
            background: var(--accent, #d946ef);
            color: #fff;
            transform: translateY(-3px);
        }

        .load-more.loading {
            opacity: 0.6;
            cursor: wait;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal.open { display: flex; }

        .modal-box {
            width: 95%;
            max-width: 1100px;
            background: #050508;
            border: 1px solid var(--accent, #d946ef);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
        }

        .modal-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: color-mix(in srgb, var(--accent, #d946ef) 85%, #000);
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-title {
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            flex: 1;
            min-width: 180px;
        }

        .modal-title small {
            display: block;
            font-weight: 400;
            font-size: 0.78rem;
            opacity: 0.85;
            margin-top: 2px;
        }

        .source-sel {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .modal-close {
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .modal-close:hover { background: rgba(0,0,0,0.3); }

        /* Season/Episode picker for TV */
        .ep-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
        }

        .ep-bar.visible { display: flex; }

        .ep-bar label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
        }

        .ep-bar select {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-color, #f5f5f5);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .ep-btns {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-height: 80px;
            overflow-y: auto;
            flex: 1;
            min-width: 200px;
        }

        .ep-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color, #f5f5f5);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            min-width: 32px;
            transition: background 0.15s;
        }

        .ep-btn:hover { background: rgba(255,255,255,0.12); }
        .ep-btn.active { background: var(--accent, #d946ef); border-color: var(--accent, #d946ef); color: #fff; }

        .player-wrap {
            position: relative;
            flex: 1;
            min-height: 360px;
            background: #000;
        }

        .modal iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            display: block;
            min-height: 540px;
        }

        .player-status {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
            pointer-events: none;
            background: #000;
        }

        .player-status.hidden { display: none; }

        @media (max-width: 600px) {
            .modal iframe { min-height: 56vw; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        }
    </style>
</head>

<body>
    <div class="movies-header">
        <div class="movies-nav">
            <div class="movies-title">Movies &amp; TV</div>
            <div class="mode-btns">
                <button class="mode-btn active" data-type="all" onclick="setType('all')">All</button>
                <button class="mode-btn" data-type="movie" onclick="setType('movie')">Movies</button>
                <button class="mode-btn" data-type="tv" onclick="setType('tv')">TV</button>
            </div>
            <div class="search-wrap">
                <input id="search" type="text" placeholder="Search movies or TV shows..." autocomplete="off" />
            </div>
        </div>
    </div>

    <main>
        <div class="grid" id="grid"></div>
        <div class="status-msg" id="status">Loading…</div>
    </main>

    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-top">
                <div class="modal-title" id="modalTitle">Loading...</div>
                <select class="source-sel" id="sourceSel" onchange="localStorage.setItem('movieSourceIdx', this.value); setIframe()"></select>
                <span class="modal-close" id="modalClose">✕</span>
            </div>
            <div class="ep-bar" id="epBar">
                <label>Season</label>
                <select id="seasonSel" onchange="loadSeason()"></select>
                <label>Episode</label>
                <div class="ep-btns" id="epBtns"></div>
            </div>
            <div class="player-wrap">
                <iframe id="player" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
                <div class="player-status hidden" id="playerStatus">Loading provider…</div>
            </div>
        </div>
    </div>

    <script>
        var TMDB_KEY = "2713804610e1e236b1cf44bfac3a7776";
        var TMDB_IMG = "https://image.tmdb.org/t/p/w342";
        var TMDB_API = "https://api.themoviedb.org/3";

        var MOVIES_SOURCES = [
            { name: "VidLink",      url: function(t,id,s,e) { return "vidlink.pro/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : ""); } },
            { name: "VidEasy (4K)", url: function(t,id,s,e) { return "player.videasy.net/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : "") + "?color=8834ec"; } },
            { name: "Vidora",       url: function(t,id,s,e) { return "vidora.su/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : ""); } },
            { name: "MappleTv",     url: function(t,id,s,e) { return t==="movie" ? "mappletv.uk/watch/movie/"+id : "mappletv.uk/watch/tv/"+id+"-"+s+"-"+e; } },
            { name: "RiveStream",   url: function(t,id,s,e) { return "rivestream.org/embed?type=" + t + "&id=" + id + (t==="tv" ? "&season="+s+"&episode="+e : ""); } },
            { name: "VidSrc",       url: function(t,id,s,e) { return "vidsrc.to/embed/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : ""); } },
            { name: "VidFast",      url: function(t,id,s,e) { return "vidfast.pro/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : ""); } },
            { name: "2Embed",       url: function(t,id,s,e) { return t==="movie" ? "www.2embed.cc/embed/"+id : "www.2embed.cc/embedtv/"+id+"&s="+s+"&e="+e; } },
            { name: "SmashyStream", url: function(t,id,s,e) { return "embed.smashystream.com/playere.php?tmdb=" + id + (t==="tv" ? "&season="+s+"&episode="+e : ""); } },
            { name: "VidNest",      url: function(t,id,s,e) { return "vidnest.fun/" + t + "/" + id + (t==="tv" ? "/"+s+"/"+e : ""); } },
        ];

        var grid = document.getElementById("grid");
        var statusEl = document.getElementById("status");
        var modal = document.getElementById("modal");
        var player = document.getElementById("player");
        var playerStatus = document.getElementById("playerStatus");
        var sourceSel = document.getElementById("sourceSel");
        var modalTitle = document.getElementById("modalTitle");
        var epBar = document.getElementById("epBar");
        var seasonSel = document.getElementById("seasonSel");
        var epBtns = document.getElementById("epBtns");
        var searchInput = document.getElementById("search");

        var trendingCache = [];
        var trendingPage = 1;
        var trendingHasMore = true;
        var searchCache = [];
        var searchPage = 1;
        var searchHasMore = true;
        var currentMode = "trending";
        var currentItem = null;
        var currentType = "all";
        var currentEp = null;
        var searchTimer = null;
        var isLoadingMore = false;

        // Find Scramjet controller — it lives on the parent window (index.html)
        function getScramjet() {
            try {
                if (window.parent && window.parent.__aetherisScramjet) return window.parent.__aetherisScramjet;
            } catch (_) {}
            return window.__aetherisScramjet || null;
        }

        // Wait up to ~10s for scramjet to be ready (it inits async on parent load)
        async function waitForScramjet(timeoutMs) {
            if (!timeoutMs) timeoutMs = 10000;
            var start = Date.now();
            while (Date.now() - start < timeoutMs) {
                var sj = getScramjet();
                if (sj && typeof sj.encodeUrl === "function") return sj;
                await new Promise(function(r) { setTimeout(r, 200); });
            }
            return null;
        }

        async function proxiedUrl(url) {
            var sj = await waitForScramjet();
            if (!sj) return url;
            try {
                var encoded = sj.encodeUrl(url);
                // encodeUrl returns the full path (e.g. "/scramjet/..."); ensure it's absolute
                if (encoded.indexOf("http") === 0) return encoded;
                return encoded.charAt(0) === "/" ? encoded : "/" + encoded;
            } catch (e) {
                console.warn("[movies] scramjet encode failed:", e);
                return url;
            }
        }

        function setType(type) {
            currentType = type;
            document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.type === type); });
            if (searchInput.value.trim()) doSearch();
            else renderGrid(filterByType(trendingCache), trendingHasMore);
        }

        function filterByType(list) {
            if (currentType === "all") return list;
            return list.filter(function(m) { return (m.media_type || (m.title ? "movie" : "tv")) === currentType; });
        }

        async function loadTrending(append) {
            currentMode = "trending";
            if (!append) {
                trendingPage = 1;
                trendingCache = [];
                trendingHasMore = true;
                statusEl.textContent = "Loading…";
            }
            try {
                var res = await fetch(TMDB_API + "/trending/all/week?api_key=" + TMDB_KEY + "&page=" + trendingPage);
                if (!res.ok) throw new Error("HTTP " + res.status);
                var data = await res.json();
                var newItems = (data.results || []).filter(function(m) { return m.poster_path && m.media_type !== "person"; });
                trendingCache = trendingCache.concat(newItems);
                trendingHasMore = trendingPage < (data.total_pages || 1);
                trendingPage++;
                renderGrid(filterByType(trendingCache), trendingHasMore);
                statusEl.textContent = "";
            } catch (e) {
                console.warn("[movies] trending failed:", e);
                if (!append) statusEl.textContent = "Failed to load. Check your connection.";
            }
        }

        async function doSearch(append) {
            var q = searchInput.value.trim();
            if (!q) return loadTrending();
            currentMode = "search";
            if (!append) {
                searchPage = 1;
                searchCache = [];
                searchHasMore = true;
                statusEl.textContent = "Searching…";
            }
            try {
                var type = currentType === "all" ? "multi" : currentType;
                var res = await fetch(TMDB_API + "/search/" + type + "?api_key=" + TMDB_KEY + "&query=" + encodeURIComponent(q) + "&page=" + searchPage);
                if (!res.ok) throw new Error("HTTP " + res.status);
                var data = await res.json();
                var list = (data.results || []).filter(function(m) { return m.poster_path && m.media_type !== "person"; });
                searchCache = searchCache.concat(list);
                searchHasMore = searchPage < (data.total_pages || 1);
                searchPage++;
                renderGrid(searchCache, searchHasMore);
                statusEl.textContent = searchCache.length === 0 ? "No results found." : "";
            } catch (e) {
                if (!append) statusEl.textContent = "Search failed.";
            }
        }

        async function loadMore() {
            if (isLoadingMore) return;
            isLoadingMore = true;
            var btn = grid.querySelector(".load-more");
            if (btn) {
                btn.classList.add("loading");
                btn.textContent = "Loading…";
            }
            try {
                if (currentMode === "search") await doSearch(true);
                else await loadTrending(true);
            } finally {
                isLoadingMore = false;
            }
        }

        function renderGrid(list, hasMore) {
            grid.innerHTML = "";
            if (!list || list.length === 0) {
                statusEl.textContent = "No results.";
                return;
            }
            var frag = document.createDocumentFragment();
            list.forEach(function(m) {
                var title = m.title || m.name || "Untitled";
                var year = (m.release_date || m.first_air_date || "").slice(0, 4);
                var type = m.media_type || (m.title ? "movie" : "tv");
                var rating = m.vote_average ? m.vote_average.toFixed(1) : "N/A";

                var card = document.createElement("div");
                card.className = "card";
                card.innerHTML =
                    '<img src="' + TMDB_IMG + m.poster_path + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' +
                    (type === "tv" ? '<span class="card-badge">TV</span>' : '') +
                    '<div class="info">' +
                        '<div class="card-title">' + escapeHtml(title) + '</div>' +
                        '<div class="card-meta">' + (year || "—") + ' · ' + rating + '/10</div>' +
                    '</div>';
                card.addEventListener("click", function() { openPlayer(m.id, type, title, year, rating); });
                frag.appendChild(card);
            });
            if (hasMore) {
                var more = document.createElement("div");
                more.className = "load-more";
                more.textContent = "Load More";
                more.addEventListener("click", loadMore);
                frag.appendChild(more);
            }
            grid.appendChild(frag);
        }

        function escapeHtml(s) {
            var d = document.createElement("div");
            d.textContent = s;
            return d.innerHTML;
        }

        async function openPlayer(id, type, title, year, rating) {
            currentItem = { id, type, title };
            currentEp = null;
            modal.classList.add("open");

            // Populate source selector, restoring last-used choice
            sourceSel.innerHTML = MOVIES_SOURCES
                .map(function(s, i) { return '<option value="' + i + '">' + s.name + '</option>'; })
                .join("");
            var savedIdx = parseInt(localStorage.getItem("movieSourceIdx") || "-1");
            if (savedIdx >= 0 && savedIdx < MOVIES_SOURCES.length) {
                sourceSel.value = String(savedIdx);
            } else {
                var defaultIdx = MOVIES_SOURCES.findIndex(function(s) { return s.name === "VidEasy (4K)"; });
                if (defaultIdx >= 0) sourceSel.value = String(defaultIdx);
            }

            modalTitle.innerHTML = escapeHtml(title) + '<small>' + (year || "") + (rating ? " · " + rating + "/10" : "") + '</small>';

            if (type === "tv") {
                epBar.classList.add("visible");
                await loadTvDetails(id);
            } else {
                epBar.classList.remove("visible");
                setIframe();
            }
        }

        async function loadTvDetails(id) {
            seasonSel.innerHTML = "";
            epBtns.innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:0.8rem">Loading…</span>';
            var totalSeasons = 1;
            try {
                var res = await fetch(TMDB_API + "/tv/" + id + "?api_key=" + TMDB_KEY);
                var data = await res.json();
                totalSeasons = data.number_of_seasons || 1;
            } catch (_) {}

            for (var s = 1; s <= totalSeasons; s++) {
                var opt = document.createElement("option");
                opt.value = s;
                opt.textContent = "Season " + s;
                seasonSel.appendChild(opt);
            }
            await loadSeason();
        }

        async function loadSeason() {
            if (!currentItem) return;
            var season = parseInt(seasonSel.value) || 1;
            epBtns.innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:0.8rem">Loading…</span>';
            try {
                var res = await fetch(TMDB_API + "/tv/" + currentItem.id + "/season/" + season + "?api_key=" + TMDB_KEY);
                var data = await res.json();
                var eps = data.episodes || [];
                epBtns.innerHTML = "";
                eps.forEach(function(ep) {
                    var btn = document.createElement("button");
                    btn.className = "ep-btn";
                    btn.textContent = ep.episode_number;
                    btn.title = ep.name || ("Episode " + ep.episode_number);
                    btn.addEventListener("click", function() { pickEp(season, ep.episode_number, btn); });
                    epBtns.appendChild(btn);
                });
                if (eps.length > 0) {
                    pickEp(season, eps[0].episode_number, epBtns.querySelector(".ep-btn"));
                }
            } catch (e) {
                epBtns.innerHTML = '<span style="color:rgba(255,255,255,0.4);font-size:0.8rem">Failed to load episodes</span>';
            }
        }

        function pickEp(season, episode, btnEl) {
            document.querySelectorAll(".ep-btn").forEach(function(b) { b.classList.remove("active"); });
            if (btnEl) btnEl.classList.add("active");
            currentEp = { season, episode };
            setIframe();
        }

        async function setIframe() {
            if (!currentItem) return;
            var idx = parseInt(sourceSel.value) || 0;
            var src = MOVIES_SOURCES[idx];
            var t = currentItem.type;
            var id = currentItem.id;
            var s = currentEp ? currentEp.season : 1;
            var e = currentEp ? currentEp.episode : 1;
            var fullUrl = "https://" + src.url(t, id, s, e);

            playerStatus.textContent = "Loading provider…";
            playerStatus.classList.remove("hidden");

            try {
                var proxied = await proxiedUrl(fullUrl);
                player.onload = function() {
                    playerStatus.classList.add("hidden");
                    try { injectAdBlock(player); } catch (_) {}
                    checkNextHydration(player, proxied);
                };
                player.src = proxied;
            } catch (err) {
                playerStatus.textContent = "Proxy not ready. Try again.";
            }
        }

        // Detect Videasy Next.js hydration failure: if #__next is still empty after load,
        // reload the iframe once; on second failure show an actionable error.
        function checkNextHydration(iframe, proxiedSrc, attempt) {
            attempt = attempt || 0;
            setTimeout(function () {
                try {
                    var doc = iframe.contentDocument;
                    var next = doc && doc.getElementById("__next");
                    if (!next) return; // not a Next.js page, nothing to check
                    if (next.children.length > 0) return; // hydrated fine
                    if (attempt === 0) {
                        // First failure: reload once
                        iframe.src = "";
                        setTimeout(function () {
                            iframe.onload = function () {
                                playerStatus.classList.add("hidden");
                                try { injectAdBlock(iframe); } catch (_) {}
                                checkNextHydration(iframe, proxiedSrc, 1);
                            };
                            iframe.src = proxiedSrc;
                        }, 300);
                    } else {
                        // Second failure: tell the user
                        playerStatus.textContent = "VidEasy didn't load through the proxy. Switch to another source.";
                        playerStatus.classList.remove("hidden");
                    }
                } catch (_) {}
            }, 6000);
        }

        // Same-origin iframe ad blocker (works for scramjet-proxied iframes since they're same-origin)
        function injectAdBlock(iframe) {
            try {
                var win = iframe.contentWindow;
                if (!win || !win.document) return;
                var doc = win.document;

                try { win.open = function() { return null; }; } catch (_) {}
                try {
                    Object.defineProperty(win, "open", { value: function() { return null; }, configurable: false, writable: false });
                } catch (_) {}

                var style = doc.createElement("style");
                style.textContent = [
                    '[id*="popunder"],[class*="popunder"],[id*="popad"],[class*="popad"]{display:none!important}',
                    '[class*="ad-overlay"],[id*="ad-overlay"]{display:none!important}',
                    '[class*="popup"],[id*="popup"]{display:none!important}',
                    '[id*="banner"],[class*="banner-ad"],[class*="ad-banner"]{display:none!important}',
                    'a[target="_blank"][rel*="nofollow"]{pointer-events:none!important;display:none!important}',
                ].join("");
                (doc.head || doc.documentElement).appendChild(style);

                doc.addEventListener("click", function(ev) {
                    var a = ev.target.closest && ev.target.closest('a[target="_blank"]');
                    if (a && !a.closest('[class*="player"],[class*="control"],[class*="jw"],[class*="plyr"],[class*="vjs"]')) {
                        ev.preventDefault();
                        ev.stopPropagation();
                    }
                }, true);
            } catch (_) {}
        }

        function closeModal() {
            modal.classList.remove("open");
            player.src = "";
            currentItem = null;
            currentEp = null;
        }

        document.getElementById("modalClose").addEventListener("click", closeModal);
        modal.addEventListener("click", function(e) { if (e.target === modal) closeModal(); });
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && modal.classList.contains("open")) closeModal();
        });

        searchInput.addEventListener("input", function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(doSearch, 350);
        });

        loadTrending();
    </script>
</body>
</html>
